{% extends "!layout.html" %}

{% block extrahead %}
  {{ super() }}
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7XPKKEN3C0');
  </script>
  <style>
    .feedback-bar {
      margin-top: 2rem;
      padding: 1rem 1.25rem;
      background: #f8f9fa;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #24292f;
    }
    .feedback-bar a.feedback-link {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 6px 14px;
      background: #1D9E75;
      color: #fff !important;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 500;
    }
    .feedback-bar a.feedback-link:hover {
      background: #178a65;
    }
    .giscus-section {
      margin-top: 2.5rem;
    }
    .giscus-section h3 {
      font-size: 1rem;
      color: #57606a;
      margin-bottom: 1rem;
      font-weight: 500;
    }
  </style>
{% endblock %}

{% block body %}
  {{ super() }}
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var content = document.querySelector('.rst-content');
      if (!content) return;

      var feedbackHTML = '<div class="feedback-bar" style="margin-top:2rem;padding:1rem 1.25rem;background:#f8f9fa;border:1px solid #e1e4e8;border-radius:6px;font-size:0.9rem;color:#24292f;">'
        + '<strong>Was this chapter helpful?</strong><br>'
        + 'We would love to hear what worked, what was confusing, or what you wish we had covered.<br>'
        + '<a href="https://docs.google.com/forms/d/e/1FAIpQLScs6AgwkxBUSF3K1QJQys1Apm6E_ypJNTvxwHSDtJHGY0Nktw/viewform" target="_blank" '
        + 'style="display:inline-block;margin-top:0.5rem;padding:6px 14px;background:#1D9E75;color:#fff;border-radius:4px;text-decoration:none;font-weight:500;">'
        + 'Share feedback via Google Form</a></div>';

      var giscusWrapper = document.createElement('div');
      giscusWrapper.style.marginTop = '2.5rem';

      var giscusLabel = document.createElement('p');
      giscusLabel.textContent = 'Comments and discussion';
      giscusLabel.style.cssText = 'font-size:1rem;color:#57606a;font-weight:500;margin-bottom:1rem;';
      giscusWrapper.appendChild(giscusLabel);

      var giscusScript = document.createElement('script');
      giscusScript.src = 'https://giscus.app/client.js';
      giscusScript.setAttribute('data-repo', 'xiaosuhu/midas-ai-in-research');
      giscusScript.setAttribute('data-repo-id', 'R_kgDOQPKJnA');
      giscusScript.setAttribute('data-category', 'General');
      giscusScript.setAttribute('data-category-id', 'DIC_kwDOQPKJnM4C4iIv');
      giscusScript.setAttribute('data-mapping', 'pathname');
      giscusScript.setAttribute('data-strict', '0');
      giscusScript.setAttribute('data-reactions-enabled', '1');
      giscusScript.setAttribute('data-emit-metadata', '0');
      giscusScript.setAttribute('data-input-position', 'bottom');
      giscusScript.setAttribute('data-theme', 'preferred_color_scheme');
      giscusScript.setAttribute('data-lang', 'en');
      giscusScript.setAttribute('crossorigin', 'anonymous');
      giscusScript.async = true;
      giscusWrapper.appendChild(giscusScript);

      content.insertAdjacentHTML('beforeend', feedbackHTML);
      content.appendChild(giscusWrapper);
    });
  </script>
{% endblock %}
